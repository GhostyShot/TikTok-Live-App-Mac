<!DOCTYPE html>
<!--
  TikLive Studio — Goal Bar Widget
  Parameter: ?type=likes ?target=1000 ?label=Like+Goal ?port=3456
-->
<html lang="de">
<head>
<meta charset="UTF-8"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=Syne:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Syne',sans-serif;}
.goal-widget{background:rgba(7,7,13,0.88);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;min-width:320px;backdrop-filter:blur(12px);}
.goal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.goal-label-text{font-size:12px;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.8px;}
.goal-nums{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#fff;}
.goal-track{height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.goal-fill{height:100%;width:0%;background:linear-gradient(90deg,#5865f2,#7c89ff);border-radius:4px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 10px rgba(88,101,242,0.5);}
.goal-complete .goal-fill{background:linear-gradient(90deg,#3ddc84,#5fffa0);animation:completePulse 1s ease infinite;}
@keyframes completePulse{0%,100%{box-shadow:0 0 15px rgba(61,220,132,0.6)}50%{box-shadow:0 0 25px rgba(61,220,132,0.9)}}
</style>
</head>
<body>
<div class="goal-widget" id="widget">
  <div class="goal-header">
    <span class="goal-label-text" id="label">Like Goal</span>
    <span class="goal-nums"><span id="current">0</span> / <span id="target">1000</span></span>
  </div>
  <div class="goal-track"><div class="goal-fill" id="fill"></div></div>
</div>
<script>
const params=new URLSearchParams(location.search);
const TYPE=params.get('type')||'likes';
const TARGET=parseInt(params.get('target')||1000);
const LABEL=params.get('label')||(TYPE.charAt(0).toUpperCase()+TYPE.slice(1))+' Goal';
const PORT=parseInt(params.get('port')||3456);
document.getElementById('label').textContent=LABEL;
document.getElementById('target').textContent=TARGET.toLocaleString();
let current=0;
function setProgress(val){current=val;document.getElementById('current').textContent=val.toLocaleString();const pct=Math.min(100,(val/TARGET)*100);document.getElementById('fill').style.width=pct+'%';document.getElementById('widget').classList.toggle('goal-complete',val>=TARGET);}
function connectWS(){try{const ws=new WebSocket(`ws://localhost:${PORT}`);ws.onmessage=(e)=>{try{const d=JSON.parse(e.data);if(d.type==='stats'){if(TYPE==='likes'&&d.likes!==undefined)setProgress(d.likes);if(TYPE==='followers'&&d.followers!==undefined)setProgress(d.followers);}if(d.type==='like'&&TYPE==='likes')setProgress(d.total||current+1);if(d.type==='follow'&&TYPE==='followers')setProgress(d.total||current+1);}catch{}};ws.onclose=()=>setTimeout(connectWS,3000);}catch{}}
connectWS();
</script>
</body>
</html>
